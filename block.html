<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Anti-Phishing-Door | Erişim Engellendi</title>
  <style>
    :root {
      --bg: #eff1f5;
      --text: #4c4f69;
      --surface: #e6e9ef;
      --danger: #d20f39;
      --danger-text: #eff1f5;
      --accent: #1e66f5;
      --accent-text: #eff1f5;
      --warn: #fe640b;
      --rules-bg: #ccd0da;
      --target-text: #40a02b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --text: #cdd6f4;
        --surface: #313244;
        --danger: #f38ba8;
        --danger-text: #11111b;
        --accent: #89b4fa;
        --accent-text: #11111b;
        --warn: #f9e2af;
        --rules-bg: #181825;
        --target-text: #a6e3a1;
      }
    }

    html[data-theme="light"] {
      --bg: #eff1f5;
      --text: #4c4f69;
      --surface: #e6e9ef;
      --danger: #d20f39;
      --danger-text: #eff1f5;
      --accent: #1e66f5;
      --accent-text: #eff1f5;
      --warn: #fe640b;
      --rules-bg: #ccd0da;
      --target-text: #40a02b;
    }

    html[data-theme="dark"] {
      --bg: #1e1e2e;
      --text: #cdd6f4;
      --surface: #313244;
      --danger: #f38ba8;
      --danger-text: #11111b;
      --accent: #89b4fa;
      --accent-text: #11111b;
      --warn: #f9e2af;
      --rules-bg: #181825;
      --target-text: #a6e3a1;
    }

    body { background-color: var(--bg); color: var(--text); font-family: monospace; text-align: center; padding: 50px; }
    .alert { color: var(--danger); font-size: 28px; font-weight: bold; margin-bottom: 20px;}
    .url-box { background: var(--surface); padding: 15px; margin: 20px auto; width: 60%; border-radius: 8px; border: 1px solid var(--danger); }
    #target-url { color: var(--target-text); font-size: 18px; word-break: break-all; }
    .rules { text-align: left; display: inline-block; background: var(--rules-bg); padding: 25px; border-radius: 8px; margin-top: 20px;}
    .rules h3 { color: var(--warn); margin-top: 0;}
    .rules li { margin-bottom: 10px; font-size: 16px;}
    button { background: var(--accent); color: var(--accent-text); border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; margin: 20px 10px; border-radius: 4px;}
    button.danger { background: var(--danger); color: var(--danger-text); }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>
<div class="alert" id="alertMsg"></div>
  
  <div class="url-box">
    <span id="urlBox"></span><br><br>
    <span id="target-url"></span>
  </div>

  <div class="rules">
    <h3 id="rulesTitle"></h3>
    <ul>
      <li id="rule1"></li>
      <li id="rule2"></li>
      <li id="rule3"></li>
    </ul>
  </div>
  
  <br>
  <button id="go-back"></button>
  <button id="proceed" class="danger"></button>

  <script src="block.js"></script>

</body>
</html>
